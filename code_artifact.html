<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LogFit">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon.svg">
  <title>LogFit</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --surface: #ffffff;
      --surface-2: #eef2f7;
      --text: #18212f;
      --muted: #667085;
      --line: #d9e0ea;
      --primary: #1769e0;
      --primary-2: #e8f1ff;
      --accent: #0f9f6e;
      --warn: #f97316;
      --danger: #e5484d;
      --shadow: 0 12px 34px rgba(15, 23, 42, .09);
      --radius: 8px;
    }
    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #0c111d;
      --surface: #151c2b;
      --surface-2: #202a3c;
      --text: #eef4ff;
      --muted: #9aa7bd;
      --line: #2b374b;
      --primary: #6aa6ff;
      --primary-2: #182a46;
      --accent: #48d39c;
      --warn: #ff9d4d;
      --danger: #ff7378;
      --shadow: 0 18px 38px rgba(0, 0, 0, .3);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    button, input, select, textarea { font: inherit; }
    button {
      border: 0;
      min-height: 40px;
      border-radius: var(--radius);
      background: var(--surface-2);
      color: var(--text);
      font-weight: 750;
      cursor: pointer;
    }
    button:active { transform: translateY(1px); }
    input, select, textarea {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 0 10px;
    }
    textarea { min-height: 132px; padding: 10px; resize: vertical; }
    label { display: grid; gap: 6px; color: var(--muted); font-size: 12px; font-weight: 800; }
    .app {
      width: min(100%, 720px);
      min-height: 100vh;
      margin: 0 auto;
      padding: env(safe-area-inset-top) 12px calc(84px + env(safe-area-inset-bottom));
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      margin: 0 -12px;
      padding: 12px 12px 10px;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line);
    }
    .brand { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .brand h1 { margin: 0; font-size: 22px; line-height: 1; }
    .brand small { color: var(--muted); font-weight: 750; }
    .toolbar { display: flex; gap: 8px; align-items: center; }
    .icon-btn { width: 42px; min-width: 42px; padding: 0; display: inline-grid; place-items: center; }
    .primary { background: var(--primary); color: #fff; }
    .danger { background: color-mix(in srgb, var(--danger) 16%, var(--surface)); color: var(--danger); }
    .ghost { background: transparent; border: 1px solid var(--line); }
    .tabs {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 40;
      width: min(100%, 720px);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      background: color-mix(in srgb, var(--surface) 94%, transparent);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }
    .tab {
      min-height: 48px;
      display: grid;
      place-items: center;
      gap: 1px;
      padding: 5px 0;
      font-size: 11px;
      color: var(--muted);
      background: transparent;
    }
    .tab svg, .icon-btn svg { width: 19px; height: 19px; stroke-width: 2.2; }
    .tab.active { color: var(--primary); background: var(--primary-2); }
    main { padding-top: 14px; }
    .view { display: none; }
    .view.active { display: grid; gap: 12px; }
    .section { display: grid; gap: 10px; }
    .section-head { display: flex; align-items: end; justify-content: space-between; gap: 10px; }
    .section h2, .panel h2 { margin: 0; font-size: 18px; }
    .hint { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.45; }
    .grid { display: grid; gap: 10px; }
    .two { grid-template-columns: 1fr 1fr; }
    .panel, .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .panel { padding: 12px; display: grid; gap: 12px; }
    .card { padding: 12px; display: grid; gap: 10px; box-shadow: none; }
    .routine-card { min-height: 116px; }
    .card-top { display: flex; align-items: start; justify-content: space-between; gap: 10px; }
    .title { margin: 0; font-size: 16px; font-weight: 850; }
    .meta { color: var(--muted); font-size: 12px; font-weight: 700; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 8px;
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    .progress { height: 8px; overflow: hidden; border-radius: 99px; background: var(--surface-2); }
    .bar { height: 100%; width: 0%; border-radius: inherit; background: var(--accent); transition: width .2s ease; }
    .exercise-card.completed { opacity: .72; background: color-mix(in srgb, var(--accent) 10%, var(--surface)); }
    .exercise-card.completed .title { text-decoration: line-through; text-decoration-thickness: 2px; }
    .set-row {
      display: grid;
      grid-template-columns: 42px 1fr 1fr 1fr 44px;
      gap: 7px;
      align-items: end;
      padding: 8px 0;
      border-top: 1px solid var(--line);
    }
    .set-row strong { align-self: center; font-size: 13px; }
    .stepper { display: grid; grid-template-columns: 38px minmax(42px, 1fr) 38px; gap: 5px; align-items: center; }
    .stepper input { text-align: center; padding: 0 4px; }
    .done-btn { background: var(--accent); color: #032016; }
    .status-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .exercise-pick {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }
    .routine-builder { display: grid; gap: 9px; }
    .builder-item { display: grid; gap: 8px; padding: 10px; border: 1px solid var(--line); border-radius: var(--radius); }
    .builder-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .dialog {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      align-items: end;
      background: rgba(4, 9, 18, .52);
    }
    .dialog.open { display: flex; }
    .sheet {
      width: min(100%, 720px);
      max-height: 92vh;
      overflow: auto;
      margin: 0 auto;
      padding: 14px 12px calc(16px + env(safe-area-inset-bottom));
      border-radius: 14px 14px 0 0;
      background: var(--surface);
      display: grid;
      gap: 12px;
    }
    .timer {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      place-items: center;
      padding: 20px;
      background: #0f172a;
      color: #fff;
      text-align: center;
      transition: background .45s ease;
    }
    .timer.open { display: grid; }
    .timer.warn { background: #9a3412; }
    .timer strong { display: block; font-size: clamp(76px, 24vw, 160px); line-height: .9; }
    .timer p { margin: 10px 0 18px; color: rgba(255,255,255,.76); font-weight: 750; }
    .chart-box { min-height: 280px; }
    canvas { max-width: 100%; }
    .empty { padding: 18px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: var(--radius); }
    @media (min-width: 680px) {
      .routine-list { grid-template-columns: repeat(2, 1fr); }
      .sheet { border-radius: 14px; margin-bottom: 28px; }
      .dialog { align-items: center; padding: 18px; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <div>
          <h1>LogFit</h1>
          <small id="subtitle">스마트 로테이션 운동 일지</small>
        </div>
        <div class="toolbar">
          <button class="icon-btn ghost" id="themeBtn" title="테마 전환" aria-label="테마 전환"></button>
          <button class="icon-btn primary" id="installBtn" title="설치" aria-label="설치" hidden></button>
        </div>
      </div>
    </header>

    <main>
      <section class="view active" data-view="dashboard">
        <div class="section">
          <div class="section-head">
            <div>
              <h2>오늘의 로테이션</h2>
              <p class="hint" id="todayText"></p>
            </div>
            <button class="primary" id="quickStartBtn">시작</button>
          </div>
          <div class="grid routine-list" id="routineCards"></div>
        </div>
      </section>

      <section class="view" data-view="workout">
        <div class="section">
          <div class="section-head">
            <div>
              <h2 id="workoutTitle">운동 기록</h2>
              <p class="hint" id="workoutHint"></p>
            </div>
            <select id="workoutRoutine"></select>
          </div>
          <div class="grid" id="workoutList"></div>
          <button class="primary" id="finishWorkoutBtn">오늘 운동 저장</button>
        </div>
      </section>

      <section class="view" data-view="manage">
        <div class="section">
          <div class="section-head">
            <div>
              <h2>루틴 관리</h2>
              <p class="hint">N분할 루틴을 만들고 순서를 바꾸세요.</p>
            </div>
            <button class="primary" id="newRoutineBtn">추가</button>
          </div>
          <div class="grid" id="manageList"></div>
        </div>
      </section>

      <section class="view" data-view="analytics">
        <div class="section">
          <div class="section-head">
            <div>
              <h2>성장 리포트</h2>
              <p class="hint">실제 중량과 수정한 반복수 기준입니다.</p>
            </div>
            <select id="chartExercise"></select>
          </div>
          <div class="panel chart-box">
            <canvas id="progressChart" height="260"></canvas>
            <div id="chartFallback" class="empty" hidden>Chart.js를 불러오면 그래프가 표시됩니다.</div>
          </div>
        </div>
      </section>

      <section class="view" data-view="backup">
        <div class="section">
          <h2>백업 및 복구</h2>
          <div class="panel">
            <p class="hint">로컬스토리지에 저장된 루틴, 기록, 설정을 JSON 파일로 옮길 수 있습니다.</p>
            <div class="grid two">
              <button class="primary" id="exportBtn">내보내기</button>
              <button id="importBtn">가져오기</button>
            </div>
            <input type="file" id="importFile" accept="application/json,.json" hidden>
            <textarea id="backupText" placeholder="JSON 백업 내용을 붙여넣고 가져오기를 눌러도 됩니다."></textarea>
            <button class="danger" id="resetBtn">전체 초기화</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <nav class="tabs" aria-label="하단 내비게이션">
    <button class="tab active" data-go="dashboard"></button>
    <button class="tab" data-go="workout"></button>
    <button class="tab" data-go="manage"></button>
    <button class="tab" data-go="analytics"></button>
    <button class="tab" data-go="backup"></button>
  </nav>

  <div class="dialog" id="routineDialog" role="dialog" aria-modal="true">
    <form class="sheet" id="routineForm">
      <div class="section-head">
        <h2 id="routineDialogTitle">루틴 편집</h2>
        <button type="button" class="icon-btn ghost" id="closeRoutineDialog" aria-label="닫기"></button>
      </div>
      <label>루틴 이름<input id="routineName" required></label>
      <div class="filters">
        <select id="partFilter"></select>
        <select id="typeFilter"></select>
      </div>
      <input id="exerciseSearch" placeholder="운동명 검색">
      <div class="grid" id="exercisePicker"></div>
      <div class="panel">
        <h2>커스텀 운동</h2>
        <div class="grid two">
          <input id="customName" placeholder="운동명">
          <select id="customPart"></select>
        </div>
        <div class="grid two">
          <select id="customType">
            <option>프리웨이트</option>
            <option>머신</option>
            <option>케이블</option>
            <option>맨몸</option>
          </select>
          <button type="button" id="addCustomBtn">등록</button>
        </div>
      </div>
      <div class="routine-builder" id="routineBuilder"></div>
      <div class="grid two">
        <button type="button" class="danger" id="deleteRoutineBtn">삭제</button>
        <button class="primary" type="submit">저장</button>
      </div>
    </form>
  </div>

  <div class="timer" id="timerOverlay">
    <div>
      <strong id="timerNumber">00</strong>
      <p id="timerLabel">휴식 중</p>
      <div class="grid two">
        <button id="skipTimerBtn">스킵</button>
        <button class="primary" id="addTimerBtn">+10초</button>
      </div>
    </div>
  </div>

    const key = "logfit.v1";

    const masterBase = [
      ["bench_press","벤치프레스","가슴","프리웨이트"],["incline_dumbbell_press","인클라인 덤벨 프레스","가슴","프리웨이트"],["dumbbell_fly","덤벨 플라이","가슴","프리웨이트"],["push_up","푸쉬업","가슴","맨몸"],["chest_press","체스트 프레스","가슴","머신"],["pec_deck","펙덱 플라이","가슴","머신"],["cable_crossover","케이블 크로스오버","가슴","케이블"],

    function renderChart() {
      const select = $("#chartExercise");
      const exerciseId = select.value || select.options[0]?.value;
      const logs = state.history.filter((log) => log.exerciseId === exerciseId).sort((a, b) => a.date.localeCompare(b.date));
      const grouped = new Map();
      logs.forEach((log) => {
        const totalVolume = log.completedSets.reduce((sum, set) => sum + set.weight * set.reps, 0);
        const best1rm = Math.max(...log.completedSets.map((set) => set.weight * (1 + set.reps / 30)), 0);
        const avgRir = log.completedSets.reduce((sum, set) => sum + set.rir, 0) / Math.max(1, log.completedSets.length);
        const old = grouped.get(log.date) || { volume: 0, oneRm: 0, rirSum: 0, count: 0 };
        grouped.set(log.date, { volume: old.volume + totalVolume, oneRm: Math.max(old.oneRm, best1rm), rirSum: old.rirSum + avgRir, count: old.count + 1 });
      });
      const labels = [...grouped.keys()];
      const data = [...grouped.values()];
      const fallback = $("#chartFallback");
      if (!window.Chart || !labels.length) {
        if (chart) chart.destroy();
        fallback.hidden = false;
        fallback.textContent = labels.length ? "Chart.js를 불러오면 그래프가 표시됩니다." : "아직 기록 데이터가 없습니다.";
        return;

            { label: "평균 RIR", data: data.map((v) => Math.round(v.rirSum / v.count * 10) / 10), borderColor: "#f97316", tension: .28, yAxisID: "y2" }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: { legend: { labels: { color: getComputedStyle(document.documentElement).getPropertyValue("--text") } } },
          scales: {
            x: { ticks: { color: getComputedStyle(document.documentElement).getPropertyValue("--muted") }, grid: { color: "rgba(120,130,150,.18)" } },
            y: { beginAtZero: true, position: "left", ticks: { color: "#1769e0" }, grid: { color: "rgba(120,130,150,.18)" } },
            y1: { beginAtZero: true, position: "right", ticks: { color: "#0f9f6e" }, grid: { drawOnChartArea: false } },
            y2: { beginAtZero: true, max: 5, position: "right", ticks: { color: "#f97316" }, grid: { drawOnChartArea: false } }
          }
        }
      });
    }
    function startTimer(seconds) {

    function tickTimer() {

    function tone(freq, duration) {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      const ctx = new AudioContext();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.frequency.value = freq;
      osc.type = "sine";
      gain.gain.setValueAtTime(.001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(.18, ctx.currentTime + .01);
      gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + duration);
      osc.connect(gain).connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + duration + .02);
    }

        const routine = state.routines.find((r) => r.id === row.dataset.routine);
        const ex = routine.exercises.find((item) => item.id === row.dataset.ex);
        const payload = Object.fromEntries($$("[data-field]", row).map((input) => [input.dataset.field, input.value]));
        upsertSet(routine, ex, Number(row.dataset.set), payload);
        startTimer(ex.restTime);
        renderAll();
      }
      const step = event.target.closest("[data-step]");
      if (step) {
        const input = step.parentElement.querySelector("input");
        input.value = Math.max(0, Number(input.value || 0) + Number(step.dataset.step));
      }
      const move = event.target.closest("[data-move]");
      if (move) {
        const index = state.routines.findIndex((r) => r.id === move.dataset.move);
        const next = index + Number(move.dataset.dir);
        if (next >= 0 && next < state.routines.length) {
          [state.routines[index], state.routines[next]] = [state.routines[next], state.routines[index]];
          saveState(); renderAll();
        }
      }
      const order = event.target.closest("[data-order]");
      if (order) {
        const index = editingExercises.findIndex((ex) => ex.id === order.dataset.order);
        const next = index + Number(order.dataset.dir);
        if (next >= 0 && next < editingExercises.length) {
          [editingExercises[index], editingExercises[next]] = [editingExercises[next], editingExercises[index]];
          renderBuilder();
        }
      }
      const remove = event.target.closest("[data-remove-builder]");
      if (remove) { editingExercises = editingExercises.filter((ex) => ex.id !== remove.dataset.removeBuilder); renderBuilder(); }
      const plus = event.target.closest("[data-plus-set]");
      if (plus) { editingExercises.find((ex) => ex.id === plus.dataset.plusSet).targetSets += 1; renderBuilder(); }
      const minus = event.target.closest("[data-minus-set]");
      if (minus) {
        const ex = editingExercises.find((item) => item.id === minus.dataset.minusSet);
        ex.targetSets = Math.max(1, ex.targetSets - 1);
        renderBuilder();
      }
    });
    $("#themeBtn").addEventListener("click", () => setTheme(state.settings.theme === "dark" ? "light" : "dark"));
    $("#installBtn").innerHTML = icon.install;
    $("#quickStartBtn").addEventListener("click", () => {
      const routine = nextRoutine();
      if (!routine) return go("manage");
      activeRoutineId = routine.id;
      renderWorkoutSelect();
      renderWorkout();
      go("workout");
    });
    $("#workoutRoutine").addEventListener("change", (e) => { activeRoutineId = e.target.value; renderWorkout(); });
    $("#finishWorkoutBtn").addEventListener("click", () => {
      if (state.routines.length) state.settings.nextRoutineIndex = (state.routines.findIndex((r) => r.id === activeRoutineId) + 1) % state.routines.length;
      saveState();
      renderAll();
      alert("저장되었습니다. 다음 추천 루틴이 갱신되었습니다.");
    });
    $("#newRoutineBtn").addEventListener("click", () => openRoutineDialog());
    $("#closeRoutineDialog").innerHTML = icon.close;
    $("#closeRoutineDialog").addEventListener("click", () => $("#routineDialog").classList.remove("open"));
    ["partFilter", "typeFilter", "exerciseSearch"].forEach((id) => $(`#${id}`).addEventListener("input", renderExercisePicker));
    $("#addCustomBtn").addEventListener("click", () => {
      const name = $("#customName").value.trim();
      if (!name) return;
      const item = { id: uid("custom"), name, part: $("#customPart").value, type: $("#customType").value, category: `${$("#customPart").value}/${$("#customType").value}` };
      state.exercisesMaster.push(item);
      $("#customName").value = "";
      saveState();
      fillFilters();
      renderExercisePicker();
    });
    $("#routineBuilder").addEventListener("input", (event) => {
      const input = event.target.closest("[data-edit-field]");
      if (!input) return;
      const item = event.target.closest("[data-builder]");
      const ex = editingExercises.find((row) => row.id === item.dataset.builder);
      ex[input.dataset.editField] = Number(input.value);
    });
    $("#routineForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const name = $("#routineName").value.trim();
      if (!name || !editingExercises.length) return alert("루틴 이름과 운동을 추가하세요.");
      if (editingRoutine) {
        editingRoutine.name = name;
        editingRoutine.exercises = editingExercises;
      } else {
        const routine = { id: uid("routine"), name, exercises: editingExercises };
        state.routines.push(routine);
        activeRoutineId = routine.id;
      }
      saveState();
      $("#routineDialog").classList.remove("open");
      renderAll();
    });
    $("#deleteRoutineBtn").addEventListener("click", () => {
      if (!editingRoutine || !confirm("이 루틴을 삭제할까요?")) return;
      state.routines = state.routines.filter((r) => r.id !== editingRoutine.id);
      state.history = state.history.filter((log) => log.routineId !== editingRoutine.id);
      activeRoutineId = state.routines[0]?.id || "";
      saveState();
      $("#routineDialog").classList.remove("open");
      renderAll();
    });
    $("#chartExercise").addEventListener("change", renderChart);
    $("#exportBtn").addEventListener("click", exportData);
    $("#importBtn").addEventListener("click", () => $("#backupText").value.trim() ? importData($("#backupText").value) : $("#importFile").click());
    $("#importFile").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (file) importData(await file.text());
    });
    $("#resetBtn").addEventListener("click", () => {
      if (confirm("모든 LogFit 데이터를 초기화할까요?")) {
        state = defaultState();
        saveState();
        renderAll();
      }
    });
    $("#skipTimerBtn").addEventListener("click", stopTimer);
    $("#addTimerBtn").addEventListener("click", () => { timerRemaining += 10; tickTimer(); });
    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredInstall = event;
      $("#installBtn").hidden = false;
    });
    $("#installBtn").addEventListener("click", async () => {
      if (!deferredInstall) return;
      deferredInstall.prompt();
      await deferredInstall.userChoice;
      deferredInstall = null;
      $("#installBtn").hidden = true;
    });
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js"));
    }
    $$(".tab")[0].innerHTML = icon.home;
    $$(".tab")[1].innerHTML = icon.dumbbell;
    $$(".tab")[2].innerHTML = icon.settings;
    $$(".tab")[3].innerHTML = icon.chart;
    $$(".tab")[4].innerHTML = icon.backup;
    renderAll();
  </script>
</body>
</html>
