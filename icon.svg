<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">LogFit app icon</title>
  <desc id="desc">A fitness dumbbell combined with workout data bars and an upward progress line.</desc>
  <defs>
    <linearGradient id="bg" x1="78" y1="48" x2="438" y2="466" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset=".52" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#06281f"/>
    </linearGradient>
    <linearGradient id="blue" x1="136" y1="158" x2="366" y2="356" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7cc0ff"/>
      <stop offset="1" stop-color="#1769e0"/>
    </linearGradient>
    <linearGradient id="green" x1="172" y1="332" x2="376" y2="178" gradientUnits="userSpaceOnUse">
      <stop stop-color="#48d39c"/>
      <stop offset="1" stop-color="#0f9f6e"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".28"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="398" cy="116" r="72" fill="#1769e0" opacity=".13"/>
  <circle cx="106" cy="412" r="92" fill="#0f9f6e" opacity=".11"/>

  <g filter="url(#softShadow)">
    <rect x="118" y="124" width="276" height="264" rx="54" fill="#f8fbff"/>
    <rect x="146" y="152" width="220" height="208" rx="34" fill="#eaf2ff"/>

    <g opacity=".98">
      <rect x="178" y="257" width="28" height="68" rx="10" fill="#b8d3ff"/>
      <rect x="226" y="226" width="28" height="99" rx="10" fill="#7fb8ff"/>
      <rect x="274" y="199" width="28" height="126" rx="10" fill="#1769e0"/>
      <rect x="322" y="168" width="28" height="157" rx="10" fill="#0f9f6e"/>
    </g>

    <path d="M168 301c35-50 63-58 93-30 26 24 52 15 91-54" fill="none" stroke="url(#green)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M338 217h34v34" fill="none" stroke="#0f9f6e" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="rotate(-28 256 258)">
      <rect x="126" y="238" width="260" height="40" rx="20" fill="#0f172a"/>
      <rect x="82" y="218" width="46" height="80" rx="16" fill="url(#blue)"/>
      <rect x="384" y="218" width="46" height="80" rx="16" fill="url(#blue)"/>
      <rect x="52" y="232" width="38" height="52" rx="14" fill="#6aa6ff"/>
      <rect x="422" y="232" width="38" height="52" rx="14" fill="#6aa6ff"/>
    </g>
  </g>

  <path d="M168 396h176" stroke="#ffffff" stroke-width="18" stroke-linecap="round" opacity=".9"/>
  <path d="M190 426h132" stroke="#48d39c" stroke-width="14" stroke-linecap="round" opacity=".9"/>
</svg>
